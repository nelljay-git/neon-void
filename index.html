<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Void Grinder</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f0f13;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #gameCanvas {
            cursor: crosshair;
            display: block;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 10;
        }

        .hud-stat {
            background: rgba(26, 26, 36, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 204, 0.2);
            padding: 10px 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-label {
            font-size: 12px;
            color: #aaa;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .hud-value {
            font-size: 24px;
            font-weight: bold;
            color: #ff00ff;
        }

        #open-shop-btn {
            background: #00ccaa;
            color: #0f0f13;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }

        #shop-indicator {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 14px;
            height: 14px;
            background-color: #ff0044;
            border-radius: 50%;
            display: none;
        }

        #shop-indicator.active {
            display: block;
            animation: pulse-shop 1s infinite alternate;
        }

        @keyframes pulse-shop {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.3);
            }
        }

        .item-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #ff0044;
            border-radius: 50%;
            margin-left: 8px;
            opacity: 0;
            transition: opacity 0.2s;
            vertical-align: middle;
        }

        .item-indicator.active {
            opacity: 1;
            animation: pulse-shop 1s infinite alternate;
        }

        #open-shop-btn:hover {
            transform: scale(1.05);
        }

        #leave-game-btn {
            background: #cc0033;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #leave-game-btn:hover {
            transform: scale(1.05);
        }

        #shop-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        #shop-modal.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .shop-content {
            background: rgba(30, 30, 45, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            padding: 30px;
            transform: scale(1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #shop-modal.hidden .shop-content {
            transform: scale(0.8);
        }

        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .shop-header h2 {
            margin: 0;
            color: #00ffcc;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
            padding: 0;
            line-height: 1;
        }

        .close-btn:hover {
            opacity: 1;
        }

        .upgrade-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .upgrade-btn:last-child {
            margin-bottom: 0;
        }

        .upgrade-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00ffcc;
        }

        .upgrade-btn:active {
            transform: scale(0.98);
        }

        .upgrade-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(100%);
        }

        .btn-info {
            text-align: left;
        }

        .btn-title {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
            font-size: 16px;
        }

        .btn-lvl {
            font-size: 14px;
            color: #aaa;
        }

        .btn-cost {
            color: #ff00ff;
            font-weight: bold;
            font-size: 18px;
        }

        #leaderboard {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, rgba(26, 26, 36, 0.8) 0%, rgba(15, 15, 25, 0.9) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 16px;
            padding: 15px;
            width: 240px;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 204, 0.1);
        }

        #leaderboard h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #00ffcc;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            padding-bottom: 10px;
        }

        #leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 14px;
        }

        #leaderboard-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 6px 10px;
            transition: background 0.2s;
        }

        #leaderboard-list li:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        #leaderboard-list li:last-child {
            margin-bottom: 0;
        }

        .lb-name {
            flex-grow: 1;
            margin-left: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
            font-weight: 500;
        }

        .lb-score {
            color: #ff00ff;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 0, 255, 0.5);
        }

        .lb-kd {
            display: flex;
            gap: 4px;
            margin-right: 8px;
        }

        .lb-badge {
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lb-k {
            color: #ff4444;
            border-color: rgba(255, 68, 68, 0.3);
        }

        .lb-d {
            color: #888;
            border-color: rgba(136, 136, 136, 0.3);
        }

        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 10, 15, 0.85);

            display: flex;
            justify-content: center;
            align-items: center;

            pointer-events: none;

        #main-menu.active {

        .menu-content {

        .menu-content h1 {

            margin-bottom: 30px;

        #player-name-input {

            padding: 15px;
            margin-bottom: 25px;

            border: 2px solid rgba(0, 255, 204, 0.5);

            color: white;

        #player-name-input:focus {

        }

        #play-btn {

            color: white;
            border: none;
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;

        #auth-section {

            font-size: 14px;
            color: #aaa;
        }

        #global-leaderboard-panel {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: left;
        }

        #global-leaderboard-panel h3 {
            margin: 0 0 10px 0;
            color: #ff00ff;
            text-align: center;
            font-size: 14px;
            letter-spacing: 2px;
        }

        #global-leaderboard-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        #global-leaderboard-list li {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            color: #ccc;
        }

        #global-leaderboard-list li:last-child {
            border-bottom: none;
        }

        .glb-name {
            color: #fff;
            font-weight: bold;
        }

        .glb-score {
            color: #00ffcc;
            font-family: monospace;
            font-size: 16px;
        }

        /* Modals */
        .auth-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(0, 255, 204, 0.3);
            padding: 30px;
            border-radius: 15px;
            z-index: 300;
            text-align: center;
            width: 300px;
        }

        .auth-modal input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #555;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .auth-modal button {
            width: 100%;
            padding: 10px;
            background: #00ffcc;
            color: #000;
            border: none;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .auth-modal button.cancel {
            background: #555;
            color: #fff;
        }

        /* Death Overlay */
        #death-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 250;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #death-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        #death-overlay h1 {
            color: rgba(255, 0, 85, 0.9);
            font-size: 56px;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
        }

        #death-overlay .death-timer {
            color: #fff;
            font-size: 22px;
            margin-top: 10px;
        }

        #btn-return-home {
            margin-top: 25px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.6);
            padding: 10px 25px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #btn-return-home:hover {
            border-color: #00ffcc;
            color: #00ffcc;
        }

        #match-timer {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #ff0044;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #ff0044;
            z-index: 20;
            transition: opacity 0.3s;
        }

        #zone-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ff0044;
            font-weight: bold;
            text-shadow: 0 0 20px #ff0044;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            transition: opacity 0.2s;
            text-align: center;
        }

        #zone-warning.active {
            opacity: 1;
            animation: pulse-warning 1s infinite alternate;
        }

        @keyframes pulse-warning {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
            }




        }

        @media screen and (max-width: 728px) {

            #hud {
                position: fixed;
                top: 5px;
                left: 5px;
                right: 5px;
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 5px;
            }

            #leaderboard {
                position: fixed;
                top: 90px;
                right: 5px;
                width: 140px;
                padding: 8px;
                box-sizing: border-box;
            }

            .hud-stat {
                padding: 4px 8px;
            }

            .hud-label {
                font-size: 10px;
                margin-bottom: 2px;
            }

            .hud-value {
                font-size: 14px;
            }

            #open-shop-btn,
            #leave-game-btn {
                padding: 6px 12px;
                font-size: 12px;
            }

            #match-timer {
                position: fixed;
                top: 60px;
                bottom: auto;
                height: auto;
                font-size: 18px;
                padding: 6px 16px;
            }

            .shop-content {
                padding: 20px;
                box-sizing: border-box;
            }
        }
    </style>
</head>

<body>

    <canvas id="gameCanvas"></canvas>

    <div id="match-timer" class="hidden">12:00</div>
    <div id="zone-warning">OUTSIDE SAFE ZONE<br><span style="font-size: 24px">TAKING DAMAGE</span></div>

    <div id="main-menu" class="active">
        <div class="menu-content">
            <h1>NEON VOID</h1>

            <div id="auth-section">
                <button id="btn-show-login" class="subtle-btn">Login</button>
                <button id="btn-show-signup" class="subtle-btn">Sign Up</button>
                <span id="logged-in-text" class="hidden">Logged in as <strong id="logged-in-user"></strong></span>
                <button id="btn-logout" class="subtle-btn hidden">Logout</button>

            <input type="text" id="player-name-input" placeholder="Enter Nickname" maxlength="16">
            <button id="play-btn">PLAY</button>
            <button id="btn-show-leaderboard" class="subtle-btn"
                style="margin-top: 15px; font-weight: bold; font-size: 16px; color: #00ffcc; text-decoration: none;">View
                Global Leaderboard</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="auth-modal hidden">
        <h2>Login</h2>
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <p id="login-error" style="color: #ff4444; font-size: 12px;"></p>
        <button id="btn-submit-login">Login</button>
        <button id="btn-cancel-login" class="cancel">Cancel</button>
    </div>

    <div id="signup-modal" class="auth-modal hidden">
        <h2>Sign Up</h2>
        <input type="text" id="signup-username" placeholder="Username">
        <input type="email" id="signup-email" placeholder="Email">
        <input type="password" id="signup-password" placeholder="Password">
        <p id="signup-error" style="color: #ff4444; font-size: 12px;"></p>
        <button id="btn-submit-signup">Sign Up</button>
        <button id="btn-cancel-signup" class="cancel">Cancel</button>
    </div>

    <!-- Global Leaderboard Modal -->
    <!-- Death Overlay -->
    <div id="death-overlay">
        <h1>YOU DIED</h1>
        <span class="death-timer" id="death-timer-text">Respawning in 3...</span>
        <button id="btn-return-home">Return to Home Screen</button>
    </div>

    <div id="leaderboard-modal" class="auth-modal hidden" style="width: 350px;">
        <h2 style="color: #ff00ff; letter-spacing: 2px; margin-top: 0; margin-bottom: 5px;">GLOBAL TOP 10</h2>
        <p style="color: #aaa; font-size: 12px; margin-top: 0; margin-bottom: 20px;">Highest Energy</p>
        <div id="global-leaderboard-panel" style="margin-top: 0; border: none; background: transparent; padding: 0;">

                <li>Loading...</li>

        <button id="btn-close-leaderboard" class="cancel" style="margin-top: 25px;">Close</button>

    <div id="hud" class="hidden">

            <span class="hud-label">ENERGY</span>

        <div class="hud-stat">
            <span class="hud-label">HIGH SCORE</span>
            <span class="hud-value" id="hud-highscore" style="color: #ffd700;">0</span>
        </div>
        <div class="hud-stat">
            <span class="hud-label">MULTIPLIER</span>
            <span class="hud-value" id="hud-mult">x1</span>
        </div>

        <button id="leave-game-btn">LEAVE</button>
    </div>

    <div id="leaderboard" class="hidden">

        <ul id="leaderboard-list">
        </ul>
    </div>

    <div id="shop-modal" class="hidden">
        <div class="shop-content">
            <div class="shop-header">
                <h2>UPGRADES</h2>
                <button class="close-btn" id="close-shop-btn">&times;</button>
            </div>

            <button class="upgrade-btn" id="btn-speed">
                <div class="btn-info">
                    <span class="btn-title">Movement Speed<span class="item-indicator" id="ind-speed"></span></span>
                    <span class="btn-lvl">Lvl <span id="lvl-speed">1</span></span>

            <button class="upgrade-btn" id="btn-magnet">

                </div>

            </button>
        </div>
