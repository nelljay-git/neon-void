    <script>
        (() => {
            // --- Supabase Multiplayer Setup ---
            const SUPABASE_URL = atob("aHR0cHM6Ly9xeHZvaXNyZWh4Y2RiaHV6d2xpay5zdXBhYmFzZS5jbw==");
            const SUPABASE_ANON_KEY = atob("ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW5GNGRtOXBjM0psYUhoalpHSm9kWHAzYkdscklpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzT0RJd05UTXdNemNzSW1WNGNDSTZNakE1TnpZeU9UQXpOMzAucFV3Um9vdnVUa1RLMW9aVTFIeFNLU0YtWXpJSDhuSndldUNVZmhrdWVfUQ==");

            let supabaseClient = null;
            let channel = null;
            const playerId = crypto.randomUUID();
            const playerColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
            let playerName = `Player${Math.floor(Math.random() * 9000) + 1000}`;
            const otherPlayers = {};
            let isBot = true;
            let botCount = 100;
            const bots = [];

            if (SUPABASE_URL !== "YOUR_SUPABASE_URL_HERE") {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                channel = supabaseClient.channel('neon-void-room', {
                    config: {
                        presence: { key: playerId },
                        broadcast: { self: false }
                    }
                });

                channel.on('presence', { event: 'join' }, ({ key, newPresences }) => {
                    if (!otherPlayers[key] && key !== playerId) {
                        otherPlayers[key] = { x: 0, y: 0, targetX: 0, targetY: 0, radius: 15, color: '#fff', name: '' };
                    }
                }).on('presence', { event: 'leave' }, ({ key, leftPresences }) => {
                    delete otherPlayers[key];
                }).on('broadcast', { event: 'kill' }, ({ payload }) => {
                    if (payload.victim === playerId && !killImmunity.has(payload.killer)) {
                        if (activeBuffs.immune > 0) return;
                        die();
                    }
                }).on('broadcast', { event: 'death_fx' }, ({ payload }) => {
                    for (let i = 0; i < 10; i++) {
                        createExplosion(payload.x, payload.y, payload.color);
                    }
                }).on('broadcast', { event: 'pos' }, ({ payload }) => {
                    if (payload.id === playerId) return;

                    if (otherPlayers[payload.id]) {
                        otherPlayers[payload.id].targetX = payload.x;
                        otherPlayers[payload.id].targetY = payload.y;
                        otherPlayers[payload.id].radius = payload.radius;
                        otherPlayers[payload.id].color = payload.color;
                        otherPlayers[payload.id].name = payload.name;
                        otherPlayers[payload.id].energy = payload.energy;
                        otherPlayers[payload.id].magnet = payload.magnet;
                        otherPlayers[payload.id].angle = payload.angle;
                        otherPlayers[payload.id].starve = payload.starve;
                        otherPlayers[payload.id].starveMax = payload.starveMax;
                        otherPlayers[payload.id].kills = payload.kills;
                        otherPlayers[payload.id].deaths = payload.deaths;
                        otherPlayers[payload.id].speedBuffActive = payload.speedBuffActive;
                        otherPlayers[payload.id].highscore = payload.highscore;
                    } else {
                        otherPlayers[payload.id] = {
                            x: payload.x, y: payload.y,
                            targetX: payload.x, targetY: payload.y,
                            radius: payload.radius,
                            color: payload.color,
                            name: payload.name,
                            energy: payload.energy,
                            magnet: payload.magnet,
                            angle: payload.angle,
                            starve: payload.starve,
                            starveMax: payload.starveMax,
                            kills: payload.kills || 0,
                            deaths: payload.deaths || 0,
                            speedBuffActive: payload.speedBuffActive || false,
                            highscore: payload.highscore || 0
                        };
                    }
                }).on('broadcast', { event: 'spawn_orb' }, ({ payload }) => {
                    if (!orbs.some(o => o.id === payload.id)) {
                        orbs.push(payload);
                    }
                }).on('broadcast', { event: 'eat_orb' }, ({ payload }) => {
                    const idx = orbs.findIndex(o => o.id === payload.id);
                    if (idx !== -1) {
                        const orb = orbs[idx];
                        createExplosion(orb.x, orb.y, orb.color);
                        orbs.splice(idx, 1);
                    }
                }).on('broadcast', { event: 'request_sync' }, () => {
                    let isHost = true;
                    for (let id in otherPlayers) {
                        if (id < playerId) isHost = false;
                    }
                    if (isHost) {
                        setTimeout(() => {
                            channel.send({
                                type: 'broadcast',
                                event: 'sync_orbs',
                                payload: orbs
                            });
                            channel.send({
                                type: 'broadcast',
                                event: 'sync_match',
                                payload: { startTime: matchStartTime }
                            });
                        }, Math.random() * 500);
                    }
                }).on('broadcast', { event: 'sync_orbs' }, ({ payload }) => {
                    payload.forEach(incomingOrb => {
                        if (!orbs.some(o => o.id === incomingOrb.id)) {
                            orbs.push(incomingOrb);
                        }
                    });
                }).on('broadcast', { event: 'sync_match' }, ({ payload }) => {
                    matchStartTime = payload.startTime;
                }).on('broadcast', { event: 'match_restart' }, ({ payload }) => {
                    restartMatch(payload.startTime);
                }).subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        // Track will be called when user hits PLAY

                        channel.send({
                            type: 'broadcast',
                            event: 'request_sync',
                            payload: {}
                        });
                    }
                });
            }

            let lastBroadcast = 0;
            const killImmunity = new Set(); // IDs of players we recently killed (ignore their kill events)

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // Resize canvas
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            // Game State
            let energy = 0;
            let peakEnergy = 0;
            let allTimeHighScore = 0;
            const mouse = { x: canvas.width / 2, y: canvas.height / 2 };

            // Mobile viewport detection
            let isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth <= 600);
            window.addEventListener('resize', () => {
                isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth <= 600);
            });

            // Mouse/Touch tracking
            let joystickActive = false;
            let joystickOrigin = { x: 0, y: 0 };
            let joystickDelta = { x: 0, y: 0 };

            const updateTarget = (e) => {
                if (e.clientX !== undefined) {
                    mouse.x = e.clientX;
                    mouse.y = e.clientY;
                }
            };

            canvas.addEventListener('mousemove', updateTarget);

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (e.touches && e.touches.length > 0) {
                    joystickActive = true;
                    joystickOrigin.x = e.touches[0].clientX;
                    joystickOrigin.y = e.touches[0].clientY;
                    joystickDelta.x = 0;
                    joystickDelta.y = 0;
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (joystickActive && e.touches && e.touches.length > 0) {
                    joystickDelta.x = e.touches[0].clientX - joystickOrigin.x;
                    joystickDelta.y = e.touches[0].clientY - joystickOrigin.y;
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                joystickActive = false;
                joystickDelta.x = 0;
                joystickDelta.y = 0;
            }, { passive: false });

            canvas.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                joystickActive = false;
                joystickDelta.x = 0;
                joystickDelta.y = 0;
            }, { passive: false });

            // World Map Size
            const worldSize = 10000;

            // Player Object
            const player = {
                x: worldSize / 2,
                y: worldSize / 2,
                radius: 15,
                speed: 0.01,     // Interpolation speed
                magnet: isMobile ? 40 : 10,      // Larger magnet radius on mobile
                mult: 0.5,         // Energy multiplier
                kills: 0,
                deaths: 0
            };

            const activeBuffs = {
                speed: 0,
                magnet: 0,
                immune: 0,
                shopCooldown: 0
            };

            // Camera
            const camera = {
                x: player.x - canvas.width / 2,
                y: player.y - canvas.height / 2
            };

            // Upgrades System
            const upgrades = {
                speed: { cost: 10, lvl: 1, max: 20, scale: 1.5, effect: () => player.speed += 0.001 },
                magnet: { cost: 25, lvl: 1, max: 50, scale: 1.6, effect: () => player.magnet += 25 },
                mult: { cost: 100, lvl: 1, max: 99, scale: 2.0, effect: () => player.mult += 1 }
            };

            let spawnRate = 10; // Lower is faster
            let frameCount = 0;

            // Entities Arrays
            const orbs = [];
            const particles = [];
            const texts = [];

            let isDead = false;
            let inMenu = true;
            let respawnTimer = 0;
            let starveTimer = 300; // 5 seconds at 60fps

            // Safe Zone Variables
            let matchStartTime = Date.now();
            const matchDuration = 12 * 60 * 1000;
            let currentSafeZoneRadius = (worldSize / 2) * Math.SQRT2;
            let framesOutsideZone = 0;
            let framesInsideZone = 0;
            let zoneDamageMultiplier = 1.0;
            function getStarveMax() {
                if (upgrades.speed.lvl >= 30 || upgrades.magnet.lvl >= 30 || upgrades.mult.lvl >= 30) {
                    return 50; // 1 second at 60fps  
                }
                if (upgrades.speed.lvl >= 20 || upgrades.magnet.lvl >= 20 || upgrades.mult.lvl >= 20) {
                    return 70; // 1.5 seconds at 60fps   
                }
                if (upgrades.speed.lvl >= 15 || upgrades.magnet.lvl >= 15 || upgrades.mult.lvl >= 15) {
                    return 180; // 3 seconds at 60fps
                }
                return 300; // 5 seconds at 60fps
            }

            function restartMatch(newStartTime) {
                matchStartTime = newStartTime || Date.now();
                currentSafeZoneRadius = (worldSize / 2) * Math.SQRT2;
                framesOutsideZone = 0;
                framesInsideZone = 0;
                zoneDamageMultiplier = 1.0;

                energy = 0;
                peakEnergy = 0;
                player.kills = 0;
                player.deaths = 0;
                player.x = worldSize / 2;
                player.y = worldSize / 2;
                player.radius = 15;
                isDead = false;
                document.getElementById('death-overlay').classList.remove('active');
                if (respawnIntervalId) {
                    clearInterval(respawnIntervalId);
                    respawnIntervalId = null;
                }

                upgrades.speed.lvl = 1; upgrades.speed.cost = 10; player.speed = 0.01;
                upgrades.magnet.lvl = 1; upgrades.magnet.cost = 25; player.magnet = isMobile ? 40 : 10;
                upgrades.mult.lvl = 1; upgrades.mult.cost = 100; player.mult = 1;
                activeBuffs.speed = 0;
                activeBuffs.magnet = 0;
                activeBuffs.immune = 180;
                starveTimer = getStarveMax();

                orbs.length = 0;
                for (let i = 0; i < 50; i++) spawnOrb();

                if (isBot) {
                    bots.length = 0;
                    for (let i = 0; i < botCount; i++) {
                        spawnBot();
                    }
                }

                updateUI();
                updateLeaderboard();
            }

            function die() {
                if (isDead) return;
                isDead = true;
                player.deaths++;
                respawnTimer = 3;

                // Show death overlay
                document.getElementById('death-overlay').classList.add('active');
                document.getElementById('death-timer-text').innerText = `Respawning in ${respawnTimer}...`;

                // Create massive explosion locally
                for (let i = 0; i < 10; i++) {
                    createExplosion(player.x, player.y, playerColor);
                }

                if (channel) {
                    channel.send({ type: 'broadcast', event: 'death_fx', payload: { x: player.x, y: player.y, color: playerColor } });
                }

                // Drop energy orbs at death position
                const dropCount = Math.min(Math.floor(energy / 2), 50);
                const energyPerOrb = dropCount > 0 ? Math.floor(energy / dropCount) : 0;
                for (let i = 0; i < dropCount; i++) {
                    const angle = (Math.PI * 2 / dropCount) * i;
                    const dist = 20 + Math.random() * 60;
                    const dropOrb = {
                        id: crypto.randomUUID(),
                        x: player.x + Math.cos(angle) * dist,
                        y: player.y + Math.sin(angle) * dist,
                        radius: Math.min(4 + energyPerOrb * 0.3, 14),
                        color: '#ff4444',
                        type: 'death_drop',
                        value: energyPerOrb
                    };
                    orbs.push(dropOrb);
                    if (channel) {
                        channel.send({ type: 'broadcast', event: 'spawn_orb', payload: dropOrb });
                    }
                }

                if (currentUser && supabaseClient && peakEnergy > 0) {
                    const finalEnergy = peakEnergy;
                    supabaseClient.from('global_leaderboard').select('max_energy').eq('id', currentUser.id).single().then(({ data }) => {
                        if (data && finalEnergy > data.max_energy) {
                            supabaseClient.from('global_leaderboard').update({ max_energy: Math.floor(finalEnergy) }).eq('id', currentUser.id).then(() => {
                                fetchGlobalLeaderboard();
                            });
                        }
                    });
                }

                energy = 0;
                peakEnergy = 0;

                // Reset Upgrades
                upgrades.speed.lvl = 1; upgrades.speed.cost = 10; player.speed = 0.01;
                upgrades.magnet.lvl = 1; upgrades.magnet.cost = 25; player.magnet = isMobile ? 40 : 10;
                upgrades.mult.lvl = 1; upgrades.mult.cost = 100; player.mult = 1;
                activeBuffs.speed = 0;
                activeBuffs.magnet = 0;
                activeBuffs.immune = 0;
                starveTimer = getStarveMax();

                updateUI();
                updateLeaderboard();

                respawnIntervalId = setInterval(() => {
                    respawnTimer--;
                    document.getElementById('death-timer-text').innerText = `Respawning in ${respawnTimer}...`;
                    if (respawnTimer <= 0) {
                        clearInterval(respawnIntervalId);
                        respawnIntervalId = null;
                        isDead = false;
                        document.getElementById('death-overlay').classList.remove('active');
                        // Spawn inside the safe zone
                        let spawnRadius = Math.max(50, currentSafeZoneRadius * 0.8);
                        let spawnAngle = Math.random() * Math.PI * 2;
                        let spawnDist = Math.random() * spawnRadius;
                        player.x = (worldSize / 2) + Math.cos(spawnAngle) * spawnDist;
                        player.y = (worldSize / 2) + Math.sin(spawnAngle) * spawnDist;
                        player.radius = 0;
                        window.spawnScale = 0; // Trigger spawn grow animation
                        starveTimer = getStarveMax();
                        activeBuffs.immune = 180;
                    }
                }, 1000);
            }

            // Buy Upgrade Function
            function buyUpgrade(type) {
                const upg = upgrades[type];
                if (energy >= upg.cost && upg.lvl < upg.max) {
                    energy -= upg.cost;
                    upg.lvl++;
                    upg.effect();
                    upg.cost = Math.floor(upg.cost * upg.scale);
                    if (starveTimer > getStarveMax()) starveTimer = getStarveMax();
                    updateUI();
                }
            }

            function toggleShop() {
                const modal = document.getElementById('shop-modal');
                const isOpening = modal.classList.contains('hidden');

                if (isOpening) {
                    if (activeBuffs.shopCooldown > 0) return;
                    activeBuffs.immune = 300; // 5 seconds at 60fps
                } else {
                    activeBuffs.shopCooldown = 600; // 10 seconds at 60fps
                }
                modal.classList.toggle('hidden');
            }

            // Attach Event Listeners
            document.getElementById('open-shop-btn').addEventListener('click', toggleShop);
            document.getElementById('close-shop-btn').addEventListener('click', toggleShop);
            document.getElementById('btn-speed').addEventListener('click', () => buyUpgrade('speed'));
            document.getElementById('btn-magnet').addEventListener('click', () => buyUpgrade('magnet'));
            document.getElementById('btn-mult').addEventListener('click', () => buyUpgrade('mult'));

            window.addEventListener('keydown', (e) => {
                if ((e.key === 'e' || e.key === 'E') && !inMenu && !isDead) {
                    if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
                    toggleShop();
                }
            });

            function formatNumber(num) {
                if (num >= 1e9) return (num / 1e9).toFixed(1).replace(/\.0$/, '') + 'b';
                if (num >= 1e6) return (num / 1e6).toFixed(1).replace(/\.0$/, '') + 'm';
                if (num >= 1e3) return (num / 1e3).toFixed(1).replace(/\.0$/, '') + 'k';
                return Math.floor(num).toString();
            }

            function updateUI() {
                document.getElementById('hud-energy').innerText = formatNumber(energy);
                document.getElementById('hud-highscore').innerText = formatNumber(allTimeHighScore);
                document.getElementById('hud-mult').innerText = `x${formatNumber(player.mult)}`;

                let anyAvailable = false;

                for (let key in upgrades) {
                    const upg = upgrades[key];
                    const btn = document.getElementById(`btn-${key}`);
                    document.getElementById(`cost-${key}`).innerText = upg.lvl >= upg.max ? "MAX" : formatNumber(upg.cost);
                    document.getElementById(`lvl-${key}`).innerText = upg.lvl;

                    if (energy < upg.cost || upg.lvl >= upg.max) {
                        btn.classList.add('disabled');
                        document.getElementById(`ind-${key}`).classList.remove('active');
                    } else {
                        btn.classList.remove('disabled');
                        document.getElementById(`ind-${key}`).classList.add('active');
                        anyAvailable = true;
                    }
                }

                const indicator = document.getElementById('shop-indicator');
                if (anyAvailable) {
                    indicator.classList.add('active');
                } else {
                    indicator.classList.remove('active');
                }
            }

            function updateLeaderboard() {
                const playersList = [{ name: playerName + " (You)", energy: energy, kills: player.kills, deaths: player.deaths, highscore: allTimeHighScore }];
                for (let id in otherPlayers) {
                    playersList.push({ name: otherPlayers[id].name, energy: otherPlayers[id].energy || 0, kills: otherPlayers[id].kills || 0, deaths: otherPlayers[id].deaths || 0, highscore: otherPlayers[id].highscore || 0 });
                }
                playersList.sort((a, b) => b.highscore - a.highscore);

                const lbList = document.getElementById('leaderboard-list');
                lbList.innerHTML = '';
                for (let i = 0; i < Math.min(10, playersList.length); i++) {
                    const p = playersList[i];
                    lbList.innerHTML += `<li>
                    <span style="color: #aaa; font-weight: bold; width: 16px;">${i + 1}.</span>
                    <span class="lb-name">${p.name || 'Unknown'}</span>
                    <div class="lb-kd">
                        <span class="lb-badge lb-k">⚔️ ${p.kills}</span>
                        <span class="lb-badge lb-d">💀 ${p.deaths}</span>
                    </div>
                    <span class="lb-score">${formatNumber(p.highscore)}</span>
                </li>`;
                }
            }

            // Spawn an Orb
            function spawnOrb(isLocal = false) {
                const margin = 300;
                let spawnX = camera.x - margin + Math.random() * (canvas.width + 2 * margin);
                let spawnY = camera.y - margin + Math.random() * (canvas.height + 2 * margin);

                // Clamp to world bounds
                spawnX = Math.max(0, Math.min(spawnX, worldSize));
                spawnY = Math.max(0, Math.min(spawnY, worldSize));

                let type = 'standard';
                let radius = Math.random() * 3 + 2;
                let color = `hsl(${Math.random() * 60 + 160}, 100%, 60%)`; // Cyan/Blue/Green hues
                let value = 1;

                const rand = Math.random();
                if (rand > 0.98) {
                    type = 'super_magnet';
                    radius = 8;
                    color = '#ff00ff';
                } else if (rand > 0.96) {
                    type = 'speed_boost';
                    radius = 7;
                    color = '#ffffff';
                } else if (rand > 0.90) {
                    type = 'big_energy';
                    radius = 12;
                    color = '#ffd700'; // Gold
                    value = 20;
                }

                const newOrb = {
                    id: crypto.randomUUID(),
                    x: spawnX,
                    y: spawnY,
                    radius: radius,
                    color: color,
                    type: type,
                    value: value
                };

                orbs.push(newOrb);

                if (isLocal && channel) {
                    channel.send({
                        type: 'broadcast',
                        event: 'spawn_orb',
                        payload: newOrb
                    });
                }
            }

            // Spawn a Bot
            function spawnBot() {
                const newBot = {
                    id: 'bot_' + crypto.randomUUID(),
                    x: Math.random() * worldSize,
                    y: Math.random() * worldSize,
                    radius: 15,
                    color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                    name: 'Bot' + Math.floor(Math.random() * 1000),
                    energy: Math.random() * 50 + 10,
                    targetX: 0,
                    targetY: 0,
                    angle: 0
                };
                bots.push(newBot);
            }

            // Create Explosion Particles
            function createExplosion(x, y, color) {
                for (let i = 0; i < 5; i++) {
                    particles.push({
                        x: x, y: y,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,
                        life: 1,
                        color: color
                    });
                }
                texts.push({
                    x: x, y: y,
                    text: `+${player.mult}`,
                    life: 1
                });
            }

            // Main Game Loop
            let currentZoom = 1;
            let effectiveSpeed = 0.01;
            let effectiveMagnet = 10;

            function loop() {
                // Match Timer & Safe Zone updates
                let elapsedTime = Date.now() - matchStartTime;
                if (!inMenu && elapsedTime >= matchDuration) {
                    restartMatch();
                    elapsedTime = 0;
                }

                let shrinkDuration = matchDuration - 10000; // 10 seconds advance
                currentSafeZoneRadius = Math.max(0, ((worldSize / 2) * Math.SQRT2) * (1 - elapsedTime / shrinkDuration));

                if (!inMenu) {
                    let timeLeft = Math.max(0, matchDuration - elapsedTime);
                    let minutes = Math.floor(timeLeft / 60000);
                    let seconds = Math.floor((timeLeft % 60000) / 1000);
                    document.getElementById('match-timer').innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                    document.getElementById('match-timer').classList.remove('hidden');
                } else {
                    document.getElementById('match-timer').classList.add('hidden');
                    document.getElementById('zone-warning').classList.remove('active');
                }

                // Clear screen with solid background for infinite canvas
                ctx.fillStyle = '#0f0f13';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if (!isDead && !inMenu) {
                    peakEnergy = Math.max(peakEnergy, energy);
                    allTimeHighScore = Math.max(allTimeHighScore, energy);
                    if (activeBuffs.speed > 0) activeBuffs.speed--;
                    if (activeBuffs.magnet > 0) activeBuffs.magnet--;
                    if (activeBuffs.immune > 0) activeBuffs.immune--;
                }

                if (activeBuffs.shopCooldown > 0) {
                    activeBuffs.shopCooldown--;
                    document.getElementById('shop-btn-text').innerText = `Shop Cooldown (${Math.ceil(activeBuffs.shopCooldown / 60)}s)`;
                } else {
                    document.getElementById('shop-btn-text').innerText = `SHOP`;
                }

                effectiveSpeed = player.speed + (activeBuffs.speed > 0 ? 0.015 : 0);
                effectiveMagnet = player.magnet + (activeBuffs.magnet > 0 ? 250 : 0);

                if (typeof window.animMagnet === 'undefined') window.animMagnet = effectiveMagnet;
                if (typeof window.lastMagnetUpdateFrame === 'undefined') window.lastMagnetUpdateFrame = 0;

                if (Math.abs(effectiveMagnet - window.animMagnet) > 0.5) {
                    window.lastMagnetUpdateFrame = frameCount;
                }

                window.animMagnet += (effectiveMagnet - window.animMagnet) * 0.1;

                let screenMin = Math.min(canvas.width, canvas.height);
                let targetZoom = Math.min(1.0, (screenMin * 0.4) / effectiveMagnet);
                if (targetZoom > 1.5) targetZoom = 1.5;
                currentZoom += (targetZoom - currentZoom) * 0.05;

                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.scale(currentZoom, currentZoom);
                ctx.translate(-canvas.width / 2, -canvas.height / 2);

                // Draw grid to show movement
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.lineWidth = 1;
                const gridSize = 50;

                const startX = canvas.width / 2 - (canvas.width / 2) / currentZoom - gridSize;
                const endX = canvas.width / 2 + (canvas.width / 2) / currentZoom + gridSize;
                const startY = canvas.height / 2 - (canvas.height / 2) / currentZoom - gridSize;
                const endY = canvas.height / 2 + (canvas.height / 2) / currentZoom + gridSize;

                const offsetX = - (camera.x % gridSize);
                const offsetY = - (camera.y % gridSize);

                ctx.beginPath();
                let firstX = Math.floor(startX / gridSize) * gridSize + offsetX;
                for (let x = firstX; x < endX; x += gridSize) {
                    ctx.moveTo(x, startY);
                    ctx.lineTo(x, endY);
                }
                let firstY = Math.floor(startY / gridSize) * gridSize + offsetY;
                for (let y = firstY; y < endY; y += gridSize) {
                    ctx.moveTo(startX, y);
                    ctx.lineTo(endX, y);
                }
                ctx.stroke();

                // Draw World Border
                ctx.strokeStyle = 'rgba(255, 0, 85, 0.5)';
                ctx.lineWidth = 5;
                ctx.strokeRect(-camera.x, -camera.y, worldSize, worldSize);

                // Draw Safe Zone
                if (!inMenu) {
                    // Fill red outside the Safe Zone
                    ctx.beginPath();
                    // Outer bounds covering the screen
                    ctx.rect(-camera.x - 2000, -camera.y - 2000, worldSize + 4000, worldSize + 4000);
                    // Inner hole
                    ctx.arc((worldSize / 2) - camera.x, (worldSize / 2) - camera.y, currentSafeZoneRadius, 0, Math.PI * 2, true); // true for counter-clockwise
                    ctx.fillStyle = 'rgba(255, 0, 68, 0.15)'; // Faint red
                    ctx.fill();

                    // Cyan Border
                    ctx.beginPath();
                    ctx.arc((worldSize / 2) - camera.x, (worldSize / 2) - camera.y, currentSafeZoneRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(0, 255, 204, 0.8)';
                    ctx.lineWidth = 8;
                    ctx.stroke();
                }

                frameCount++;
                let currentSpawnRate = spawnRate * (1 + Object.keys(otherPlayers).length);
                if (frameCount % currentSpawnRate === 0) {
                    spawnOrb(true);
                    // Spawn extra orbs naturally over time as screen size permits
                    if (orbs.length < 300) spawnOrb(true);
                }

                if (!isDead && !inMenu) {
                    if (typeof spawnScale === 'undefined') window.spawnScale = 1;
                    if (spawnScale < 1) {
                        spawnScale += 0.05;
                        if (spawnScale > 1) spawnScale = 1;
                    }
                    // Dynamic Radius based on Energy
                    player.radius = (15 + Math.sqrt(energy) * 1.5) * spawnScale;

                    // Move Player smoothly towards mouse world coordinates, but cap maximum speed
                    if (isMobile) {
                        if (joystickActive) {
                            let dist = Math.sqrt(joystickDelta.x * joystickDelta.x + joystickDelta.y * joystickDelta.y);
                            const maxJoyDist = 50; // max joystick pull
                            let moveDist = Math.min(dist, maxJoyDist);

                            if (dist > 0) {
                                let dirX = joystickDelta.x / dist;
                                let dirY = joystickDelta.y / dist;

                                const maxDist = 200;
                                let dx = dirX * maxDist * (moveDist / maxJoyDist);
                                let dy = dirY * maxDist * (moveDist / maxJoyDist);

                                player.x += dx * effectiveSpeed;
                                player.y += dy * effectiveSpeed;
                                if (dist > 0) player.angle = Math.atan2(dy, dx);
                            }
                        }
                    } else {
                        let dx = (mouse.x - canvas.width / 2) / currentZoom;
                        let dy = (mouse.y - canvas.height / 2) / currentZoom;
                        let dist = Math.sqrt(dx * dx + dy * dy);

                        // Cap the distance to limit maximum velocity
                        const maxDist = 200;
                        if (dist > maxDist) {
                            dx = (dx / dist) * maxDist;
                            dy = (dy / dist) * maxDist;
                        }

                        player.x += dx * effectiveSpeed;
                        player.y += dy * effectiveSpeed;
                        if (dist > 0) player.angle = Math.atan2(dy, dx);
                    }

                    // Clamp player to world bounds
                    player.x = Math.max(player.radius, Math.min(player.x, worldSize - player.radius));
                    player.y = Math.max(player.radius, Math.min(player.y, worldSize - player.radius));

                    // Update camera position to keep player centered
                    camera.x = player.x - canvas.width / 2;
                    camera.y = player.y - canvas.height / 2;

                    // Draw Player Magnet Radius
                    ctx.beginPath();
                    ctx.arc(player.x - camera.x, player.y - camera.y, window.animMagnet, 0, Math.PI * 2);
                    let magnetAlpha = 0.1;
                    if (frameCount - window.lastMagnetUpdateFrame < 180) {
                        magnetAlpha = 0.1 + 0.1 * Math.sin(frameCount * 0.1);
                    }
                    ctx.strokeStyle = `rgba(0, 255, 204, ${magnetAlpha})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // Speed Boost Trail Logic
                    if (typeof window.playerTrail === 'undefined') window.playerTrail = [];
                    let targetX = player.x - Math.cos(player.angle || 0) * player.radius * 0.8;
                    let targetY = player.y - Math.sin(player.angle || 0) * player.radius * 0.8;

                    if (activeBuffs.speed > 0) {
                        let numSegments = 12;
                        while (window.playerTrail.length < numSegments) {
                            window.playerTrail.push({ x: targetX, y: targetY });
                        }
                    } else if (window.playerTrail.length > 0) {
                        window.playerTrail.pop(); // shrink from tail to fade out
                        if (window.playerTrail.length > 0) window.playerTrail.pop();
                    }

                    // Snake interpolation for delay effect
                    for (let i = 0; i < window.playerTrail.length; i++) {
                        let pt = window.playerTrail[i];
                        pt.x += (targetX - pt.x) * 0.35; // delay factor
                        pt.y += (targetY - pt.y) * 0.35;
                        targetX = pt.x;
                        targetY = pt.y;
                    }

                    // Draw Player Trail
                    for (let i = 0; i < window.playerTrail.length; i++) {
                        let pt = window.playerTrail[i];
                        let revIdx = window.playerTrail.length - 1 - i;
                        let alpha = (revIdx / window.playerTrail.length) * 0.5;
                        let r = player.radius * (revIdx / window.playerTrail.length);

                        ctx.beginPath();
                        ctx.arc(pt.x - camera.x, pt.y - camera.y, r * 0.8, 0, Math.PI * 2);
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = '#ffffff';
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(pt.x - camera.x, pt.y - camera.y, r, 0, Math.PI * 2);
                        ctx.globalAlpha = alpha * 0.5;
                        ctx.fillStyle = playerColor;
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1.0;

                    // Draw Player
                    ctx.beginPath();
                    ctx.arc(player.x - camera.x, player.y - camera.y, player.radius, 0, Math.PI * 2);
                    ctx.fillStyle = playerColor;
                    ctx.fill();

                    // Draw Player Arrow
                    if (player.angle !== undefined) {
                        ctx.save();
                        ctx.translate(player.x - camera.x, player.y - camera.y);
                        ctx.rotate(player.angle);
                        ctx.beginPath();
                        ctx.moveTo(player.radius + 10, 0);
                        ctx.lineTo(player.radius - 2, -6);
                        ctx.lineTo(player.radius - 2, 6);
                        ctx.closePath();
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                        ctx.fill();
                        ctx.restore();
                    }

                    // Draw Player Immunity Indicator
                    if (activeBuffs.immune > 0) {
                        ctx.beginPath();
                        ctx.arc(player.x - camera.x, player.y - camera.y, player.radius + 8, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.5 + 0.5 * Math.sin(frameCount * 0.2)})`; // Pulsing effect
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    }

                    // Draw Starvation Pie Timer on Player
                    const starveRatio = starveTimer / getStarveMax();
                    let timerColor;
                    if (starveRatio > 0.5) timerColor = `rgba(0, 255, 100, 0.6)`;
                    else if (starveRatio > 0.25) timerColor = `rgba(255, 200, 0, 0.7)`;
                    else timerColor = `rgba(255, ${Math.floor(50 + 50 * Math.sin(frameCount * 0.3))}, 50, 0.8)`;
                    const pieRadius = player.radius + 5;
                    const startAngle = -Math.PI / 2;
                    const endAngle = startAngle + (Math.PI * 2 * starveRatio);
                    ctx.beginPath();
                    ctx.moveTo(player.x - camera.x, player.y - camera.y);
                    ctx.arc(player.x - camera.x, player.y - camera.y, pieRadius, startAngle, endAngle);
                    ctx.closePath();
                    ctx.fillStyle = timerColor;
                    ctx.fill();

                    // Draw local player name
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                    ctx.font = 'bold 12px "Segoe UI"';
                    ctx.textAlign = 'center';
                    ctx.fillText(playerName + " (You)", player.x - camera.x, player.y - camera.y - player.radius - 10);

                    // Supabase Multiplayer: Broadcast our position
                    const now = Date.now();
                    if (channel && now - lastBroadcast > 100) {
                        channel.send({
                            type: 'broadcast',
                            event: 'pos',
                            payload: { id: playerId, x: player.x, y: player.y, radius: player.radius, color: playerColor, name: playerName, energy: energy, magnet: effectiveMagnet, angle: player.angle, starve: starveTimer, starveMax: getStarveMax(), kills: player.kills, deaths: player.deaths, speedBuffActive: activeBuffs.speed > 0, highscore: allTimeHighScore }
                        });
                        lastBroadcast = now;
                    }

                    // --- Safe Zone Damage Logic ---
                    let distToCenter = Math.hypot(player.x - (worldSize / 2), player.y - (worldSize / 2));
                    if (distToCenter > currentSafeZoneRadius) {
                        framesInsideZone = 0;
                        framesOutsideZone++;
                        document.getElementById('zone-warning').classList.add('active');

                        if (framesOutsideZone % 60 === 0) {
                            // Take damage
                            let damage = Math.max(1, energy * (zoneDamageMultiplier / 100));
                            energy -= damage;
                            createExplosion(player.x, player.y, '#ff0044'); // Damage FX

                            if (energy <= 0) {
                                energy = 0; // Ensure it doesn't go negative
                                die();
                            }
                            zoneDamageMultiplier += (currentSafeZoneRadius <= 0) ? 2.5 : 1.2;
                            updateUI();
                        }
                    } else {
                        framesInsideZone++;
                        document.getElementById('zone-warning').classList.remove('active');
                        if (framesInsideZone >= 60) {
                            zoneDamageMultiplier = 1.0;
                            framesOutsideZone = 0;
                        }
                    }
                    // --- End Safe Zone Damage Logic ---

                    // Starvation timer
                    if (activeBuffs.immune <= 0) {
                        starveTimer--;
                    }
                    if (starveTimer <= 0) {
                        die();
                    }
                } else if (inMenu) {
                    camera.x += 1;
                    camera.y += 1;
                    if (camera.x > worldSize) camera.x = 0;
                    if (camera.y > worldSize) camera.y = 0;
                }

                if (frameCount % 30 === 0) {
                    updateLeaderboard();
                }

                for (let id in otherPlayers) {
                    let p = otherPlayers[id];
                    // Interpolate
                    p.x += (p.targetX - p.x) * 0.2;
                    p.y += (p.targetY - p.y) * 0.2;

                    if (typeof p.animMagnet === 'undefined') p.animMagnet = p.magnet || 10;
                    if (typeof p.lastMagnetUpdateFrame === 'undefined') p.lastMagnetUpdateFrame = 0;

                    if (Math.abs((p.magnet || 10) - p.animMagnet) > 0.5) {
                        p.lastMagnetUpdateFrame = frameCount;
                    }
                    p.animMagnet += ((p.magnet || 10) - p.animMagnet) * 0.1;

                    // PvP Collision Check
                    if (!isDead && !inMenu) {
                        let dx = p.x - player.x;
                        let dy = p.y - player.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < player.radius + p.radius) {
                            // Check who is bigger
                            if (energy > (p.energy || 0)) {
                                // We eat them!
                                energy += (p.energy || 0);
                                player.kills++;
                                createExplosion(p.x, p.y, p.color);
                                // Grant kill immunity so their kill event doesn't kill us back
                                killImmunity.add(id);
                                setTimeout(() => killImmunity.delete(id), 2000);
                                channel.send({
                                    type: 'broadcast',
                                    event: 'kill',
                                    payload: { victim: id, killer: playerId }
                                });
                                delete otherPlayers[id]; // Temporarily remove
                                updateUI();
                                continue; // skip rendering them this frame
                            }
                        }
                    }

                    // Render remote player magnet
                    ctx.beginPath();
                    ctx.arc(p.x - camera.x, p.y - camera.y, p.animMagnet, 0, Math.PI * 2);
                    let pMagnetAlpha = 0.1;
                    if (frameCount - p.lastMagnetUpdateFrame < 180) {
                        pMagnetAlpha = 0.1 + 0.1 * Math.sin(frameCount * 0.1);
                    }
                    ctx.strokeStyle = `rgba(0, 255, 204, ${pMagnetAlpha})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Remote player trail logic
                    if (typeof p.trail === 'undefined') p.trail = [];
                    let pTargetX = p.x - Math.cos(p.angle || 0) * p.radius * 0.8;
                    let pTargetY = p.y - Math.sin(p.angle || 0) * p.radius * 0.8;

                    if (p.speedBuffActive) {
                        let numSegments = 12;
                        while (p.trail.length < numSegments) {
                            p.trail.push({ x: pTargetX, y: pTargetY });
                        }
                    } else if (p.trail.length > 0) {
                        p.trail.pop();
                        if (p.trail.length > 0) p.trail.pop();
                    }

                    // Snake interpolation for delay effect
                    for (let i = 0; i < p.trail.length; i++) {
                        let pt = p.trail[i];
                        pt.x += (pTargetX - pt.x) * 0.35;
                        pt.y += (pTargetY - pt.y) * 0.35;
                        pTargetX = pt.x;
                        pTargetY = pt.y;
                    }

                    // Draw remote Player Trail
                    for (let i = 0; i < p.trail.length; i++) {
                        let pt = p.trail[i];
                        let revIdx = p.trail.length - 1 - i;
                        let alpha = (revIdx / p.trail.length) * 0.5;
                        let r = p.radius * (revIdx / p.trail.length);

                        ctx.beginPath();
                        ctx.arc(pt.x - camera.x, pt.y - camera.y, r * 0.8, 0, Math.PI * 2);
                        ctx.globalAlpha = alpha;
                        ctx.fillStyle = '#ffffff';
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(pt.x - camera.x, pt.y - camera.y, r, 0, Math.PI * 2);
                        ctx.globalAlpha = alpha * 0.5;
                        ctx.fillStyle = p.color;
                        ctx.fill();
                    }
                    ctx.globalAlpha = 1.0;

                    // Render remote player
                    ctx.beginPath();
                    ctx.arc(p.x - camera.x, p.y - camera.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();

                    // Render remote player arrow
                    if (p.angle !== undefined) {
                        ctx.save();
                        ctx.translate(p.x - camera.x, p.y - camera.y);
                        ctx.rotate(p.angle);
                        ctx.beginPath();
                        ctx.moveTo(p.radius + 10, 0);
                        ctx.lineTo(p.radius - 2, -6);
                        ctx.lineTo(p.radius - 2, 6);
                        ctx.closePath();
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                        ctx.fill();
                        ctx.restore();
                    }

                    // Render remote player name
                    if (p.name) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                        ctx.font = '12px "Segoe UI"';
                        ctx.textAlign = 'center';
                        ctx.fillText(p.name, p.x - camera.x, p.y - camera.y - p.radius - 10);
                    }

                    // Render remote player starvation pie timer
                    if (p.starve !== undefined) {
                        const rStarveRatio = p.starve / (p.starveMax || 300);
                        let rTimerColor;
                        if (rStarveRatio > 0.5) rTimerColor = `rgba(0, 255, 100, 0.6)`;
                        else if (rStarveRatio > 0.25) rTimerColor = `rgba(255, 200, 0, 0.7)`;
                        else rTimerColor = `rgba(255, 80, 50, 0.8)`;
                        const rPieRadius = p.radius + 5;
                        const rStartAngle = -Math.PI / 2;
                        const rEndAngle = rStartAngle + (Math.PI * 2 * rStarveRatio);
                        ctx.beginPath();
                        ctx.moveTo(p.x - camera.x, p.y - camera.y);
                        ctx.arc(p.x - camera.x, p.y - camera.y, rPieRadius, rStartAngle, rEndAngle);
                        ctx.closePath();
                        ctx.fillStyle = rTimerColor;
                        ctx.fill();
                    }
                }

                // Update and Draw Bots
                if (isBot && !inMenu) {
                    for (let i = bots.length - 1; i >= 0; i--) {
                        let bot = bots[i];
                        bot.radius = 15 + Math.sqrt(bot.energy) * 1.5;

                        // Very simple Bot AI: Random wandering + drift towards center if too far
                        if (Math.random() < 0.02) {
                            bot.targetX = bot.x + (Math.random() - 0.5) * 400;
                            bot.targetY = bot.y + (Math.random() - 0.5) * 400;
                            // Keep in bounds
                            bot.targetX = Math.max(0, Math.min(bot.targetX, worldSize));
                            bot.targetY = Math.max(0, Math.min(bot.targetY, worldSize));
                        }

                        let dx = bot.targetX - bot.x;
                        let dy = bot.targetY - bot.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist > 0) {
                            bot.x += (dx / dist) * 1.5;
                            bot.y += (dy / dist) * 1.5;
                            bot.angle = Math.atan2(dy, dx);
                        }

                        // Bot eats orbs
                        for (let j = orbs.length - 1; j >= 0; j--) {
                            let orb = orbs[j];
                            let odx = bot.x - orb.x;
                            let ody = bot.y - orb.y;
                            if (Math.sqrt(odx * odx + ody * ody) < bot.radius + orb.radius) {
                                bot.energy += orb.value || 1;
                                orbs.splice(j, 1);
                                createExplosion(orb.x, orb.y, orb.color);
                            }
                        }

                        // Bot vs Player collision
                        if (!isDead) {
                            let pdx = bot.x - player.x;
                            let pdy = bot.y - player.y;
                            let pDist = Math.sqrt(pdx * pdx + pdy * pdy);
                            if (pDist < bot.radius + player.radius) {
                                if (energy > bot.energy) {
                                    // Player eats bot
                                    energy += bot.energy;
                                    player.kills++;
                                    createExplosion(bot.x, bot.y, bot.color);
                                    bots.splice(i, 1);
                                    spawnBot();
                                    continue;
                                } else if (bot.energy > energy && activeBuffs.immune <= 0) {
                                    // Bot eats player
                                    bot.energy += energy;
                                    die();
                                }
                            }
                        }

                        // Draw Bot
                        ctx.beginPath();
                        ctx.arc(bot.x - camera.x, bot.y - camera.y, bot.radius, 0, Math.PI * 2);
                        ctx.fillStyle = bot.color;
                        ctx.fill();

                        // Draw Bot Name
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                        ctx.font = '12px "Segoe UI"';
                        ctx.textAlign = 'center';
                        ctx.fillText(bot.name, bot.x - camera.x, bot.y - camera.y - bot.radius - 10);
                    }
                }

                // Update and Draw Orbs
                for (let i = orbs.length - 1; i >= 0; i--) {
                    let orb = orbs[i];

                    let dx = player.x - orb.x;
                    let dy = player.y - orb.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    // Cull distant orbs
                    const maxDim = Math.max(canvas.width, canvas.height) / currentZoom;
                    if (dist > maxDim + 500) {
                        orbs.splice(i, 1);
                        continue;
                    }

                    // Magnet logic
                    if (!isDead && !inMenu) {
                        if (dist < effectiveMagnet) {
                            orb.x += dx * 0.1; // Pull towards player
                            orb.y += dy * 0.1;
                        }

                        // Collision (Collect)
                        if (dist < player.radius + orb.radius) {
                            if (orb.type === 'big_energy') {
                                energy += (orb.value || 20) * player.mult;
                            } else if (orb.type === 'speed_boost') {
                                energy += 1 * player.mult;
                                activeBuffs.speed = 300; // 5 seconds
                            } else if (orb.type === 'super_magnet') {
                                energy += 1 * player.mult;
                                activeBuffs.magnet = 600; // 10 seconds
                            } else if (orb.type === 'death_drop') {
                                energy += (orb.value || 1) * player.mult;
                            } else {
                                energy += (orb.value || 1) * player.mult;
                            }

                            let maxLife = getStarveMax();
                            if (upgrades.speed.lvl >= 20 || upgrades.magnet.lvl >= 20 || upgrades.mult.lvl >= 20) {
                                let addAmount = orb.type === 'big_energy' ? 15 : 5; // Big orb adds 1.5s, regular adds 0.2s
                                starveTimer += addAmount;
                                if (starveTimer > maxLife) starveTimer = maxLife;
                            } else {
                                starveTimer = maxLife; // Reset starvation timer on eating any orb
                            }

                            createExplosion(orb.x, orb.y, orb.color);

                            if (channel) {
                                channel.send({
                                    type: 'broadcast',
                                    event: 'eat_orb',
                                    payload: { id: orb.id }
                                });
                            }

                            orbs.splice(i, 1);
                            updateUI();
                            continue;
                        }
                    }

                    // Draw Orb
                    ctx.beginPath();
                    ctx.arc(orb.x - camera.x, orb.y - camera.y, orb.radius, 0, Math.PI * 2);
                    ctx.fillStyle = orb.color;
                    ctx.fill();
                }

                // Update and Draw Particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.05;

                    if (p.life <= 0) {
                        particles.splice(i, 1);
                        continue;
                    }

                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x - camera.x, p.y - camera.y, 2, 2);
                    ctx.globalAlpha = 1.0;
                }

                // Update and Draw Floating Text
                for (let i = texts.length - 1; i >= 0; i--) {
                    let t = texts[i];
                    t.y -= 1; // Float up
                    t.life -= 0.02;

                    if (t.life <= 0) {
                        texts.splice(i, 1);
                        continue;
                    }

                    ctx.globalAlpha = t.life;
                    ctx.fillStyle = '#ff00ff';
                    ctx.font = '14px Arial';
                    ctx.fillText(t.text, t.x - camera.x, t.y - camera.y);
                    ctx.globalAlpha = 1.0;
                }

                ctx.restore();

                // Draw Off-screen pointers
                if (!inMenu && !isDead) {
                    const drawPointer = (entity) => {
                        let screenX = (entity.x - camera.x - canvas.width / 2) * currentZoom + canvas.width / 2;
                        let screenY = (entity.y - camera.y - canvas.height / 2) * currentZoom + canvas.height / 2;

                        const padding = 20;
                        const isOffScreen = screenX < padding || screenX > canvas.width - padding || screenY < padding || screenY > canvas.height - padding;

                        let worldDx = entity.x - player.x;
                        let worldDy = entity.y - player.y;
                        let worldDist = Math.sqrt(worldDx * worldDx + worldDy * worldDy);
                        let viewRadius = Math.max(canvas.width, canvas.height) / currentZoom;

                        // Only show the pointer if they are relatively near (within 1.2x of the screen view radius)
                        if (isOffScreen && worldDist < viewRadius * 1.2) {
                            let dx = screenX - canvas.width / 2;
                            let dy = screenY - canvas.height / 2;
                            let angle = Math.atan2(dy, dx);

                            // Clamp to edge
                            let edgeX = canvas.width / 2;
                            let edgeY = canvas.height / 2;
                            let m = dy / dx;

                            if (Math.abs(m) > (canvas.height / 2 - padding) / (canvas.width / 2 - padding)) {
                                // Intersects top or bottom
                                edgeY = dy > 0 ? canvas.height - padding : padding;
                                edgeX = canvas.width / 2 + (edgeY - canvas.height / 2) / m;
                            } else {
                                // Intersects left or right
                                edgeX = dx > 0 ? canvas.width - padding : padding;
                                edgeY = canvas.height / 2 + (edgeX - canvas.width / 2) * m;
                            }

                            ctx.save();
                            ctx.translate(edgeX, edgeY);
                            ctx.rotate(angle);
                            ctx.beginPath();
                            ctx.moveTo(10, 0);
                            ctx.lineTo(-10, -8);
                            ctx.lineTo(-10, 8);
                            ctx.closePath();
                            ctx.fillStyle = entity.color;
                            ctx.fill();
                            ctx.restore();
                        }
                    };

                    for (let id in otherPlayers) {
                        drawPointer(otherPlayers[id]);
                    }
                    if (isBot) {
                        for (let i = 0; i < bots.length; i++) {
                            drawPointer(bots[i]);
                        }
                    }
                }

                // Death screen is now an HTML overlay

                // Keep UI updated for button states
                if (frameCount % 10 === 0) updateUI();

                requestAnimationFrame(loop);
            }

            let currentUser = null;

            async function checkSession() {
                if (!supabaseClient) return;
                const { data, error } = await supabaseClient.auth.getSession();
                if (data && data.session) {
                    currentUser = data.session.user;
                    const { data: profile } = await supabaseClient.from('global_leaderboard').select('username').eq('id', currentUser.id).single();
                    if (profile) {
                        playerName = profile.username;
                        document.getElementById('logged-in-user').innerText = playerName;
                        document.getElementById('logged-in-text').classList.remove('hidden');
                        document.getElementById('btn-logout').classList.remove('hidden');
                        document.getElementById('btn-show-login').classList.add('hidden');
                        document.getElementById('btn-show-signup').classList.add('hidden');
                        document.getElementById('player-name-input').value = playerName;
                        document.getElementById('player-name-input').classList.add('hidden');
                    }
                }
            }

            async function fetchGlobalLeaderboard() {
                if (!supabaseClient) return;
                const { data, error } = await supabaseClient.from('global_leaderboard').select('username, max_energy').order('max_energy', { ascending: false }).limit(10);
                const list = document.getElementById('global-leaderboard-list');
                list.innerHTML = '';
                if (data && data.length > 0) {
                    data.forEach((p, i) => {
                        list.innerHTML += `<li>
                            <span class="glb-name">${i + 1}. ${p.username}</span>
                            <span class="glb-score">${formatNumber(p.max_energy)}</span>
                        </li>`;
                    });
                } else {
                    list.innerHTML = '<li>No scores yet!</li>';
                }
            }

            // Auth Event Listeners
            document.getElementById('btn-show-login').addEventListener('click', () => {
                document.getElementById('login-modal').classList.remove('hidden');
            });
            document.getElementById('btn-cancel-login').addEventListener('click', () => {
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('login-error').innerText = '';
            });
            document.getElementById('btn-show-signup').addEventListener('click', () => {
                document.getElementById('signup-modal').classList.remove('hidden');
            });
            document.getElementById('btn-cancel-signup').addEventListener('click', () => {
                document.getElementById('signup-modal').classList.add('hidden');
                document.getElementById('signup-error').innerText = '';
            });

            // Leaderboard Modal Listeners
            document.getElementById('btn-show-leaderboard').addEventListener('click', () => {
                document.getElementById('leaderboard-modal').classList.remove('hidden');
            });
            document.getElementById('btn-close-leaderboard').addEventListener('click', () => {
                document.getElementById('leaderboard-modal').classList.add('hidden');
            });

            document.getElementById('btn-submit-signup').addEventListener('click', async () => {
                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;
                const username = document.getElementById('signup-username').value;
                if (!username || !email || !password) return;

                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if (error) {
                    document.getElementById('signup-error').innerText = error.message;
                } else {
                    if (data.user) {
                        await supabaseClient.from('global_leaderboard').insert([{ id: data.user.id, username: username, max_energy: 0 }]);
                        document.getElementById('signup-modal').classList.add('hidden');
                        checkSession();
                    }
                }
            });

            document.getElementById('btn-submit-login').addEventListener('click', async () => {
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                if (!email || !password) return;

                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    document.getElementById('login-error').innerText = error.message;
                } else {
                    document.getElementById('login-modal').classList.add('hidden');
                    checkSession();
                }
            });

            document.getElementById('btn-logout').addEventListener('click', async () => {
                await supabaseClient.auth.signOut();
                currentUser = null;
                document.getElementById('logged-in-text').classList.add('hidden');
                document.getElementById('btn-logout').classList.add('hidden');
                document.getElementById('btn-show-login').classList.remove('hidden');
                document.getElementById('btn-show-signup').classList.remove('hidden');
                document.getElementById('player-name-input').classList.remove('hidden');
                document.getElementById('player-name-input').value = `Player${Math.floor(Math.random() * 9000) + 1000}`;
            });

            let respawnIntervalId = null;

            function returnToHome() {
                // Cancel respawn timer
                if (respawnIntervalId) {
                    clearInterval(respawnIntervalId);
                    respawnIntervalId = null;
                }
                isDead = false;
                document.getElementById('death-overlay').classList.remove('active');

                // Reset player state
                player.x = worldSize / 2;
                player.y = worldSize / 2;
                player.radius = 15;
                energy = 0;
                peakEnergy = 0;
                player.kills = 0;
                player.deaths = 0;
                upgrades.speed.lvl = 1; upgrades.speed.cost = 10; player.speed = 0.01;
                upgrades.magnet.lvl = 1; upgrades.magnet.cost = 25; player.magnet = isMobile ? 40 : 10;
                upgrades.mult.lvl = 1; upgrades.mult.cost = 100; player.mult = 1;
                activeBuffs.speed = 0;
                activeBuffs.magnet = 0;
                activeBuffs.immune = 0;
                starveTimer = getStarveMax();
                window.spawnScale = 0;

                // Show main menu, hide game UI
                inMenu = true;
                document.getElementById('main-menu').classList.add('active');
                document.getElementById('hud').classList.add('hidden');
                document.getElementById('leaderboard').classList.add('hidden');
                document.getElementById('shop-modal').classList.add('hidden');

                fetchGlobalLeaderboard();
                updateUI();
            }

            document.getElementById('btn-return-home').addEventListener('click', returnToHome);
            document.getElementById('leave-game-btn').addEventListener('click', returnToHome);

            document.getElementById('player-name-input').value = playerName;

            document.getElementById('play-btn').addEventListener('click', () => {
                const nameInput = document.getElementById('player-name-input').value.trim();
                if (nameInput) playerName = nameInput;

                document.getElementById('main-menu').classList.remove('active');
                document.getElementById('hud').classList.remove('hidden');
                document.getElementById('leaderboard').classList.remove('hidden');

                inMenu = false;
                activeBuffs.immune = 180;
                window.spawnScale = 0;

                if (channel) channel.track({ online_at: new Date().toISOString() });
            });

            // Start game
            window.spawnScale = 0;
            for (let i = 0; i < 50; i++) spawnOrb(); // Initial orbs
            if (isBot) {
                for (let i = 0; i < botCount; i++) {
                    spawnBot();
                }
            }
            updateUI();

            // Init Auth & Leaderboard
            checkSession();
            fetchGlobalLeaderboard();

            loop();

        })();
    </script>
</body>

</html>
